{% extends "voting/base.html" %}
{% block title %}Anmelden – STWEG{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-header">
        <div class="login-logo">STWEG</div>
        <div class="section-label">Abstimmungsportal</div>
        <div class="login-sub">Melde dich an, um abzustimmen</div>
    </div>

    <div class="card card--login">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Benutzername</label>
                <input type="text" name="username" id="id_username" class="form-input"
                       autofocus required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="id_password">Passwort</label>
                <input type="password" name="password" id="id_password" class="form-input"
                       required autocomplete="current-password">
            </div>
            {% if form.errors %}
            <div class="message message-error mb-1">
                Benutzername oder Passwort falsch.
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary btn-full mt-1">Anmelden</button>
        </form>
    </div>
</div>
{% endblock %}
